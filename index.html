<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tache</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--card:#1a1a22;--soft:#22222e;--border:#2f2f40;--text:#f0eff8;--muted:#918da8;--accent:#7c5cfc;--accent2:#fc5c7d;--green:#5cfca0;--yellow:#fcd45c;--orange:#fc8c5c}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{min-height:100vh;max-width:440px;margin:0 auto;padding:20px 18px 40px;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif}.screen{display:none;animation:fadeIn .25s ease}.screen.active{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.logo,.big-label,.method-title,.btn-primary,.timer-display,.timer-btn,.home-action,.project-title{font-family:"Syne",sans-serif}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:28px}.header{display:flex;align-items:center;gap:10px}.logo{font-weight:800;font-size:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.nav-btn,.back-link{border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);font-size:13px;padding:10px 12px;cursor:pointer}.back-link{display:inline-flex;margin-bottom:20px;background:none;color:var(--muted)}.big-label{font-size:26px;font-weight:700;line-height:1.2;margin-bottom:20px}.big-label span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.home-actions{display:grid;gap:12px;margin-top:18px}.home-action{width:100%;border:1.5px solid var(--border);border-radius:16px;background:var(--card);color:var(--text);padding:22px;text-align:left;cursor:pointer}.home-action strong{display:block;font-size:20px;margin-bottom:6px}.home-action span{color:var(--muted);font-family:"DM Sans",sans-serif;font-size:14px;line-height:1.45}.home-action.primary{border-color:rgba(124,92,252,.55);background:linear-gradient(135deg,rgba(124,92,252,.2),rgba(252,92,125,.12))}input,textarea{width:100%;border:1.5px solid var(--border);border-radius:16px;outline:none;background:var(--card);color:var(--text);font:16px "DM Sans",sans-serif;padding:16px;transition:border-color .2s}textarea{min-height:108px;resize:none}input:focus,textarea:focus{border-color:var(--accent)}input::placeholder,textarea::placeholder{color:var(--muted)}label{display:block;margin:18px 0 8px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase}.voice-row{display:grid;gap:8px;margin-top:12px}.voice-btn{width:100%;border:1.5px solid var(--accent);border-radius:14px;background:rgba(124,92,252,.16);color:var(--text);font:700 15px "Syne",sans-serif;padding:15px 16px;cursor:pointer}.voice-btn.listening{border-color:var(--accent2);background:rgba(252,92,125,.18)}.voice-btn:disabled{opacity:.45}.voice-status{min-height:18px;color:var(--muted);font-size:12px;text-align:center}.btn-primary{width:100%;border:0;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:17px;font-weight:700;padding:18px;cursor:pointer}.btn-primary:disabled{cursor:not-allowed;opacity:.35}.btn-secondary{width:100%;margin-top:10px;border:1.5px solid var(--border);border-radius:14px;background:var(--card);color:var(--text);font:700 15px "DM Sans",sans-serif;padding:14px;cursor:pointer}.feeling-label{margin:28px 0 14px;color:var(--muted);font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase}.feelings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}.feel-btn{position:relative;border:1.5px solid var(--border);border-radius:14px;background:var(--card);padding:14px 12px;text-align:left;cursor:pointer}.feel-btn .emoji{display:block;margin-bottom:6px;font-size:22px}.feel-name{display:block;color:var(--text);font-family:"Syne",sans-serif;font-size:13px;font-weight:700}.feel-sub{display:block;margin-top:2px;color:var(--muted);font-size:11px}.feel-btn.selected{border-color:var(--accent);background:rgba(124,92,252,.12)}.feel-btn.selected:after{content:"✓";position:absolute;top:8px;right:10px;color:var(--accent);font-size:13px;font-weight:700}.methods{display:flex;flex-direction:column;gap:10px;margin:20px 0 24px}.method-btn{display:flex;align-items:center;gap:14px;width:100%;border:1.5px solid var(--border);border-radius:14px;background:var(--card);padding:16px;text-align:left;cursor:pointer}.method-icon{display:flex;flex:0 0 44px;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;font-size:22px}.method-title{color:var(--text);font-size:15px;font-weight:700}.method-desc{margin-top:3px;color:var(--muted);font-size:12px;line-height:1.4}.response-card,.panel{margin:16px 0;border:1.5px solid var(--border);border-radius:18px;background:var(--card);padding:18px;font-size:16px;line-height:1.65;white-space:pre-wrap}.task-recap{margin-bottom:20px;border:1px solid rgba(124,92,252,.2);border-radius:12px;background:rgba(124,92,252,.08);color:var(--muted);font-size:14px;padding:14px 16px}.task-recap strong{display:block;margin-bottom:4px;color:var(--text);font-size:15px}.loading{display:flex;align-items:center;gap:10px;padding:20px 0;color:var(--muted);font-size:15px}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite}.dot:nth-child(2){animation-delay:.2s;background:var(--accent2)}.dot:nth-child(3){animation-delay:.4s;background:var(--yellow)}@keyframes bounce{0%,80%,100%{opacity:.4;transform:scale(.6)}40%{opacity:1;transform:scale(1)}}.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;margin:16px 0;border:1.5px solid var(--border);border-radius:18px;background:var(--card);padding:24px}.timer-display{font-size:52px;font-weight:800;letter-spacing:2px}.timer-row{display:flex;gap:10px}.timer-btn{border:0;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:15px;font-weight:700;padding:12px 28px;cursor:pointer}.timer-reset{border:1.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--muted);font-size:15px;padding:12px 18px;cursor:pointer}svg.ring{transform:rotate(-90deg)}.ring-bg{fill:none;stroke:var(--border);stroke-width:5}.ring-fill{fill:none;stroke:url(#grad);stroke-linecap:round;stroke-width:5;transition:stroke-dashoffset 1s linear}.done-msg{padding:16px 0;text-align:center;font-size:28px}.project-card{border:1.5px solid var(--border);border-radius:16px;background:var(--card);padding:16px;margin:10px 0;cursor:pointer}.project-card strong{display:block;margin-bottom:5px}.project-card span{color:var(--muted);font-size:13px}.project-title{font-size:22px;margin-bottom:4px}.project-meta{color:var(--muted);font-size:13px;margin-bottom:12px}.progress-wrap{display:flex;align-items:center;gap:18px;margin:16px 0}.progress-circle{width:104px;height:104px;border-radius:50%;background:conic-gradient(var(--green) var(--progress),var(--border) 0);display:grid;place-items:center;flex:0 0 104px}.progress-circle div{width:78px;height:78px;border-radius:50%;background:var(--bg);display:grid;place-items:center;font:800 20px "Syne",sans-serif}.step-list{display:grid;gap:10px;margin:14px 0}.step-item{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:flex-start;border:1.5px solid var(--border);border-radius:14px;background:var(--soft);padding:12px}.step-item input{width:20px;height:20px;margin-top:3px}.step-item.done .step-text{text-decoration:line-through;color:var(--muted)}.priority{display:inline-block;margin-bottom:4px;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:700}.p-high{background:rgba(252,92,125,.18);color:#ff9aae}.p-mid{background:rgba(252,212,92,.18);color:#ffe08a}.p-low{background:rgba(92,252,160,.15);color:#9bffc5}.file-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.file-pill{border:1px solid var(--border);border-radius:999px;background:var(--soft);color:var(--muted);font-size:12px;padding:6px 9px}.project-tools{display:grid;grid-template-columns:1fr 1fr;gap:10px}.small-input{min-height:auto;padding:12px;text-align:center}.empty{color:var(--muted);text-align:center;padding:30px 12px}
</style>
</head>
<body>
<main>
<section class="screen active" id="screen-home">
  <div class="topbar"><div class="header"><span>⚡</span><span class="logo">Tache</span></div><button class="nav-btn" id="nav-projects">Mes projets</button></div>
  <div class="big-label">Tu veux faire quoi <span>maintenant</span> ?</div>
  <div class="home-actions">
    <button class="home-action primary" id="go-create-project"><strong>Créer un nouveau projet</strong><span>Construis un plan clair avec questions guidées, micro-étapes, timers et progression.</span></button>
    <button class="home-action" id="go-work"><strong>Je veux travailler</strong><span>Ouvre le mode tâche rapide avec la dictée, les méthodes existantes et les timers.</span></button>
  </div>
</section>

<section class="screen" id="screen-projects">
  <button class="back-link" data-screen="screen-home">← Accueil</button>
  <div class="big-label">Mes <span>projets</span></div>
  <div id="project-list"></div>
  <button class="btn-primary" data-screen="screen-project-create">Créer un nouveau projet</button>
</section>

<section class="screen" id="screen-project-create">
  <button class="back-link" data-screen="screen-home">← Accueil</button>
  <div class="big-label">Nouveau <span>projet</span></div>
  <label for="project-name">Nom du projet</label><input id="project-name" placeholder="Ex : dossier d'inscription, chambre, exposé...">
  <label for="project-desc">Ce que tu dois faire</label><textarea id="project-desc" placeholder="Décris en quelques phrases ce que tu veux accomplir."></textarea>
  <label for="project-goal">Quel est le but principal ?</label><textarea id="project-goal" placeholder="Le résultat final attendu."></textarea>
  <label for="project-critical">Quelles sont les étapes critiques ?</label><textarea id="project-critical" placeholder="Les étapes à ne pas rater, une par ligne si tu veux."></textarea>
  <label for="project-obstacles">Quels obstacles envisages-tu ?</label><textarea id="project-obstacles" placeholder="Ce qui peut bloquer, distraire ou ralentir."></textarea>
  <label for="project-files">Fichiers utiles</label><input id="project-files" type="file" multiple>
  <label for="project-duration">Durée Pomodoro par session</label><input class="small-input" id="project-duration" type="number" min="5" max="60" value="25">
  <button class="btn-primary" id="build-project">Créer le plan</button>
</section>

<section class="screen" id="screen-project-detail">
  <button class="back-link" data-screen="screen-home">← Accueil</button>
  <div id="project-detail"></div>
</section>

<section class="screen" id="screen-task">
  <div class="topbar"><button class="nav-btn" data-screen="screen-home">Accueil</button><button class="nav-btn" id="nav-projects-2">Mes projets</button></div>
  <div class="header"><span>⚡</span><span class="logo">Tache</span></div>
  <div class="big-label">C'est quoi ta <span>tâche</span> ?</div>
  <textarea id="task-input" placeholder="Ex : envoyer un email, ranger ma chambre, réviser..." rows="4"></textarea>
  <div class="voice-row"><button class="voice-btn" id="voice-btn" type="button">Dictée</button><div class="voice-status" id="voice-status">Dictée française uniquement.</div></div>
  <div class="feeling-label">Comment tu te sens là ?</div>
  <div class="feelings">
    <button class="feel-btn" data-feel="rapide"><span class="emoji">⚡</span><span class="feel-name">Démarrer vite</span><span class="feel-sub">Règle 2 min · Timer-course</span></button>
    <button class="feel-btn" data-feel="bloquee"><span class="emoji">🧱</span><span class="feel-name">Je suis bloquée</span><span class="feel-sub">Reverse Pomodoro · Micro-étape</span></button>
    <button class="feel-btn" data-feel="motivation"><span class="emoji">🎮</span><span class="feel-name">Besoin motivation</span><span class="feel-sub">Mini-quête · Task racing</span></button>
    <button class="feel-btn" data-feel="submergee"><span class="emoji">😰</span><span class="feel-name">Je suis submergée</span><span class="feel-sub">1 seule chose · Brain dump</span></button>
    <button class="feel-btn" data-feel="temps" style="grid-column:span 2"><span class="emoji">⏱️</span><span class="feel-name">Combien de temps ?</span><span class="feel-sub">Estimation x1.5 · Découpage visible</span></button>
  </div>
  <button class="btn-primary" id="btn-next" disabled>Voir mes options →</button>
</section>

<section class="screen" id="screen-methods">
  <button class="back-link" data-screen="screen-task">← Retour</button>
  <div class="task-recap"><strong id="recap-task"></strong><span id="recap-feels"></span></div>
  <div class="big-label">Quelle <span>méthode</span> ?</div><div class="methods" id="methods-list"></div>
</section>

<section class="screen" id="screen-response">
  <button class="back-link" data-reset-task>← Nouvelle tâche</button>
  <div class="task-recap"><strong id="resp-task"></strong></div>
  <div id="loading-wrap" class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Préparation de ton plan...</span></div>
  <div id="response-content" style="display:none"><div class="response-card" id="response-text"></div><div id="timer-section" style="display:none"><div class="timer-wrap"><svg width="100" height="100" viewBox="0 0 100 100" class="ring"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#7c5cfc"/><stop offset="100%" style="stop-color:#fc5c7d"/></linearGradient></defs><circle class="ring-bg" cx="50" cy="50" r="44"/><circle class="ring-fill" id="ring" cx="50" cy="50" r="44" stroke-dasharray="276.46" stroke-dashoffset="0"/></svg><div class="timer-display" id="timer-display">5:00</div><div class="timer-row"><button class="timer-btn" id="timer-btn">▶ Start</button><button class="timer-reset" id="timer-reset">↺</button></div><div id="timer-done" style="display:none" class="done-msg">🎉 +1 point !</div></div></div><button class="btn-primary" data-reset-task>Nouvelle tâche ⚡</button><button class="btn-secondary" id="reset-all">Tout recommencer</button></div>
</section>
</main>
<script>
const STORE='tache_projects_v1',TOTAL_SECONDS=300,CIRCUMFERENCE=276.46;let timerRemaining=TOTAL_SECONDS,timerRunning=false,timerInterval=null,selectedFeels=[],currentTask='',recognition=null,isListening=false,voiceBaseText='',activeProjectId=null,projectTimer=null,projectRemaining=0,projectRunning=false;
const $=id=>document.getElementById(id);function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');window.scrollTo(0,0);if(id==='screen-projects')renderProjects()}document.querySelectorAll('[data-screen]').forEach(b=>b.addEventListener('click',()=>showScreen(b.dataset.screen)));$('nav-projects').onclick=()=>showScreen('screen-projects');$('nav-projects-2').onclick=()=>showScreen('screen-projects');$('go-create-project').onclick=()=>showScreen('screen-project-create');$('go-work').onclick=()=>showScreen('screen-task');
function projects(){return JSON.parse(localStorage.getItem(STORE)||'[]')}function saveProjects(list){localStorage.setItem(STORE,JSON.stringify(list))}function lineSplit(t){return t.split(/\n|,|;/).map(x=>x.trim()).filter(Boolean)}function makeSteps(){const desc=$('project-desc').value.trim(),goal=$('project-goal').value.trim(),crit=lineSplit($('project-critical').value),obs=lineSplit($('project-obstacles').value),steps=[];steps.push({text:'Clarifier le résultat attendu : '+(goal||desc||'définir le projet'),priority:'high',done:false});crit.forEach(x=>steps.push({text:x,priority:'high',done:false}));steps.push({text:'Préparer le matériel, les fichiers et l’espace de travail',priority:'mid',done:false});steps.push({text:'Faire une première version imparfaite mais complète',priority:'mid',done:false});obs.forEach(x=>steps.push({text:'Prévoir une solution pour : '+x,priority:'mid',done:false}));steps.push({text:'Vérifier le minimum utile et corriger ce qui bloque',priority:'low',done:false});steps.push({text:'Sauvegarder ou ranger le résultat final',priority:'low',done:false});return steps.slice(0,12)}
$('build-project').onclick=()=>{const name=$('project-name').value.trim()||'Projet sans nom';const files=[...$('project-files').files].map(f=>f.name);const project={id:Date.now().toString(),name,desc:$('project-desc').value.trim(),goal:$('project-goal').value.trim(),critical:$('project-critical').value.trim(),obstacles:$('project-obstacles').value.trim(),files,duration:Math.max(5,Math.min(60,Number($('project-duration').value)||25)),steps:makeSteps(),created:new Date().toISOString()};const list=projects();list.unshift(project);saveProjects(list);openProject(project.id)};
function renderProjects(){const list=projects(),box=$('project-list');box.innerHTML=list.length?'':'<div class="empty">Aucun projet sauvegardé pour l’instant.</div>';list.forEach(p=>{const done=p.steps.filter(s=>s.done).length,total=p.steps.length;const card=document.createElement('button');card.className='project-card';card.innerHTML=`<strong>${p.name}</strong><span>${done}/${total} étapes terminées · ${p.duration} min</span>`;card.onclick=()=>openProject(p.id);box.appendChild(card)})}
function openProject(id){activeProjectId=id;renderProjectDetail();showScreen('screen-project-detail')}function progress(p){return p.steps.length?Math.round(p.steps.filter(s=>s.done).length/p.steps.length*100):0}function renderProjectDetail(){const p=projects().find(x=>x.id===activeProjectId);if(!p)return showScreen('screen-projects');projectRemaining=p.duration*60;const pct=progress(p);$('project-detail').innerHTML=`<div class="project-title">${p.name}</div><div class="project-meta">${p.duration} min par Pomodoro · ${p.files.length} fichier(s)</div><div class="progress-wrap"><div class="progress-circle" style="--progress:${pct}%"><div>${pct}%</div></div><div>${p.desc||'Projet sauvegardé.'}</div></div><div class="panel"><strong>But principal</strong><br>${p.goal||'À préciser.'}</div><div class="file-list">${p.files.map(f=>`<span class="file-pill">${f}</span>`).join('')||'<span class="file-pill">Aucun fichier ajouté</span>'}</div><div class="step-list">${p.steps.map((s,i)=>`<label class="step-item ${s.done?'done':''}"><input type="checkbox" data-step="${i}" ${s.done?'checked':''}><span class="step-text"><span class="priority p-${s.priority==='high'?'high':s.priority==='mid'?'mid':'low'}">${s.priority==='high'?'Priorité haute':s.priority==='mid'?'Priorité moyenne':'Priorité basse'}</span><br>${s.text}</span></label>`).join('')}</div><div class="timer-wrap"><div class="timer-display" id="project-timer-display">${p.duration}:00</div><div class="timer-row"><button class="timer-btn" id="project-timer-btn">▶ Start</button><button class="timer-reset" id="project-timer-reset">↺</button></div></div><div class="project-tools"><button class="btn-secondary" id="save-project-btn">Sauvegarder</button><button class="btn-secondary" id="delete-project-btn">Supprimer</button></div>`;document.querySelectorAll('[data-step]').forEach(cb=>cb.onchange=e=>toggleProjectStep(Number(e.target.dataset.step),e.target.checked));$('project-timer-btn').onclick=toggleProjectTimer;$('project-timer-reset').onclick=resetProjectTimer;$('save-project-btn').onclick=()=>renderProjectDetail();$('delete-project-btn').onclick=deleteProject}
function toggleProjectStep(i,done){const list=projects(),p=list.find(x=>x.id===activeProjectId);p.steps[i].done=done;saveProjects(list);renderProjectDetail()}function deleteProject(){saveProjects(projects().filter(p=>p.id!==activeProjectId));activeProjectId=null;showScreen('screen-projects')}function updateProjectTimer(){const m=Math.floor(projectRemaining/60),s=projectRemaining%60;const el=$('project-timer-display');if(el)el.textContent=m+':'+String(s).padStart(2,'0')}function toggleProjectTimer(){if(projectRemaining<=0)return;projectRunning=!projectRunning;const btn=$('project-timer-btn');if(projectRunning){btn.textContent='⏸ Pause';projectTimer=setInterval(()=>{projectRemaining--;updateProjectTimer();if(projectRemaining<=0){clearInterval(projectTimer);projectRunning=false;btn.textContent='Terminé'}},1000)}else{btn.textContent='▶ Continuer';clearInterval(projectTimer)}}function resetProjectTimer(){const p=projects().find(x=>x.id===activeProjectId);clearInterval(projectTimer);projectRunning=false;projectRemaining=(p?.duration||25)*60;updateProjectTimer();$('project-timer-btn').textContent='▶ Start'}
const methodsByFeeling={rapide:[{id:'regle2',icon:'🎯',color:'#5cfca0',title:'Règle des 2 min',desc:"Une action si petite que c'est impossible de refuser"},{id:'timer_course',icon:'🏁',color:'#fcd45c',title:'Timer-course',desc:'Combien tu peux faire en 5 min chrono ?'}],bloquee:[{id:'reverse_pomodoro',icon:'🍅',color:'#fc8c5c',title:'Reverse Pomodoro',desc:'Juste 5 min. Pas besoin de finir.'},{id:'micro_etape',icon:'•',color:'#7c5cfc',title:'Micro-étape ridicule',desc:'Action minuscule pour remettre le mouvement'}],motivation:[{id:'mini_quete',icon:'⚔️',color:'#fc5c7d',title:'Mini-quête RPG',desc:'Points, niveau, récompense : ton cerveau adore ça'},{id:'task_racing',icon:'🏎️',color:'#fcd45c',title:'Task Racing',desc:'Timer compétitif contre toi-même'}],submergee:[{id:'une_chose',icon:'🎯',color:'#5cfca0',title:'1 seule chose',desc:'Tout le reste à la poubelle. Maintenant.'},{id:'brain_dump',icon:'🧠',color:'#7c5cfc',title:'Brain Dump Express',desc:'Vide ta tête en 60 secondes puis on trie'}],temps:[{id:'estimation',icon:'⏱️',color:'#fc8c5c',title:'Estimation x1.5',desc:'Le temps réel avec les sous-tâches cachées'},{id:'decoupage',icon:'📊',color:'#5cfca0',title:'Découpage visible',desc:'Progression numérotée : 1/7, 2/7...'}]};
const feelingLabels={rapide:'⚡ Démarrer vite',bloquee:'🧱 Bloquée',motivation:'🎮 Motivation',submergee:'😰 Submergée',temps:'⏱️ Temps'},timerMethods=new Set(['timer_course','mini_quete','task_racing','reverse_pomodoro']);const responses={regle2:()=>"⚡ Ouvre juste le document ou l'application nécessaire.\nC'est tout. Pas besoin d'aller plus loin maintenant.",timer_course:()=>`🏁 Top chrono.\nPendant 5 minutes, avance le plus possible sur :\n"${currentTask}"\nPas besoin de finir.`,reverse_pomodoro:()=>"🍅 Tu fais juste 5 minutes.\nAprès, tu as totalement le droit d'arrêter.\nCommence uniquement par la première mini-action.",micro_etape:()=>`Micro-étape ridicule :\nPrends juste ce qu'il faut pour commencer "${currentTask}".\nRien d'autre.`,mini_quete:()=>`⚔️ QUÊTE ACTIVÉE\nMission : ${currentTask}\n🎯 Niveau 1 : commencer\n⚡ Niveau 2 : 5 minutes focus\n🏆 Récompense : pause dopamine autorisée`,task_racing:()=>`🏎️ Challenge lancé.\nCombien peux-tu avancer sur "${currentTask}" en 5 minutes ?\nGo.`,une_chose:()=>`🎯 Une seule chose compte maintenant :\n${currentTask}\nIgnore absolument le reste.`,brain_dump:()=>"🧠 Vide tout ce qui tourne dans ta tête.\nPuis classe :\n• Maintenant\n• Plus tard\n• Poubelle",estimation:()=>"⏱️ Estimation réaliste :\nAjoute le temps d'installation, les interruptions et les mini-pauses.\nPuis multiplie par 1.5.",decoupage:()=>"📊 Découpage :\n1/5 Ouvrir ce qu'il faut\n2/5 Faire la première action\n3/5 Avancer un peu\n4/5 Finir le minimum utile\n5/5 Vérifier rapidement"};
function updateNextButton(){const task=$('task-input').value.trim();$('btn-next').disabled=task.length<=2||selectedFeels.length===0}function toggleFeeling(button){button.classList.toggle('selected');selectedFeels=[...document.querySelectorAll('.feel-btn.selected')].map(item=>item.dataset.feel);updateNextButton()}function goToMethods(){currentTask=$('task-input').value.trim();$('recap-task').textContent=currentTask;$('recap-feels').textContent=selectedFeels.map(f=>feelingLabels[f]).join(' · ');const list=$('methods-list');list.innerHTML='';selectedFeels.forEach(feel=>methodsByFeeling[feel].forEach(method=>{const b=document.createElement('button');b.className='method-btn';b.innerHTML=`<div class="method-icon" style="background:${method.color}22">${method.icon}</div><div><div class="method-title">${method.title}</div><div class="method-desc">${method.desc}</div></div>`;b.onclick=()=>chooseMethod(method.id);list.appendChild(b)}));showScreen('screen-methods')}function chooseMethod(id){$('resp-task').textContent=currentTask;$('loading-wrap').style.display='flex';$('response-content').style.display='none';showScreen('screen-response');resetTimer();setTimeout(()=>{$('response-text').textContent=responses[id]?.()||'Commence par une toute petite action.';$('loading-wrap').style.display='none';$('response-content').style.display='block';$('timer-section').style.display=timerMethods.has(id)?'block':'none'},350)}
function toggleTimer(){if(timerRemaining===0)return;timerRunning=!timerRunning;const b=$('timer-btn');if(timerRunning){b.textContent='⏸ Pause';timerInterval=setInterval(tickTimer,1000)}else{b.textContent='▶ Continuer';clearInterval(timerInterval)}}function tickTimer(){timerRemaining--;const m=Math.floor(timerRemaining/60),s=timerRemaining%60;$('timer-display').textContent=m+':'+String(s).padStart(2,'0');$('ring').style.strokeDashoffset=CIRCUMFERENCE*(1-timerRemaining/TOTAL_SECONDS);if(timerRemaining<=0){clearInterval(timerInterval);timerRunning=false;$('timer-btn').style.display='none';$('timer-done').style.display='block'}}function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerRemaining=TOTAL_SECONDS;$('timer-display').textContent='5:00';$('ring').style.strokeDashoffset=0;$('timer-btn').textContent='▶ Start';$('timer-btn').style.display='inline-block';$('timer-done').style.display='none'}function resetAll(){selectedFeels=[];document.querySelectorAll('.feel-btn').forEach(b=>b.classList.remove('selected'));$('task-input').value='';setVoiceStatus('Dictée française uniquement.');updateNextButton();showScreen('screen-task')}
function setVoiceStatus(msg){$('voice-status').textContent=msg}function setupVoiceDictation(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition,b=$('voice-btn');if(!SR){b.disabled=true;setVoiceStatus('Dictée non disponible sur ce navigateur.');return}recognition=new SR();recognition.lang='fr-FR';recognition.continuous=false;recognition.interimResults=true;recognition.maxAlternatives=1;recognition.onstart=()=>{isListening=true;b.classList.add('listening');b.textContent='Arrêter';setVoiceStatus("J'écoute en français...")};recognition.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;const input=$('task-input'),space=voiceBaseText&&t?' ':'';input.value=(voiceBaseText+space+t).trimStart();updateNextButton()};recognition.onerror=e=>setVoiceStatus({'not-allowed':'Micro refusé. Autorise le micro pour dicter.','no-speech':"Je n'ai rien entendu. Réessaie en parlant en français.",network:"La dictée a besoin d'une connexion active."}[e.error]||'Dictée interrompue. Réessaie.');recognition.onend=()=>{isListening=false;b.classList.remove('listening');b.textContent='Dictée';if($('task-input').value.trim())setVoiceStatus('Dictée ajoutée en français.')};b.onclick=()=>{if(isListening){recognition.stop();return}voiceBaseText=$('task-input').value.trim();recognition.lang='fr-FR';recognition.start()}}
document.querySelectorAll('.feel-btn').forEach(b=>b.onclick=()=>toggleFeeling(b));$('task-input').addEventListener('input',updateNextButton);$('btn-next').onclick=goToMethods;$('timer-btn').onclick=toggleTimer;$('timer-reset').onclick=resetTimer;$('reset-all').onclick=resetAll;document.querySelectorAll('[data-reset-task]').forEach(b=>b.onclick=()=>showScreen('screen-task'));setupVoiceDictation();
</script>
